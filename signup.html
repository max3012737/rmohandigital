```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Sign Up</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0b1020;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111b31;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#00d4ff;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

#msg{
margin-top:15px;
}
</style>
</head>
<body>

<div class="box">
<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">Sign Up</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQhTcbf7u4Aw2hgIgm3jS1ucm8_21Hj8U",
  authDomain: "r-mohan-digital.firebaseapp.com",
  projectId: "r-mohan-digital",
  storageBucket: "r-mohan-digital.firebasestorage.app",
  messagingSenderId: "437837739461",
  appId: "1:437837739461:web:86ce4fcf767050296907ac"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("signupBtn").addEventListener("click", async () => {

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const userCredential =
await createUserWithEmailAndPassword(auth,email,password);

await updateProfile(userCredential.user,{
displayName:name
});

document.getElementById("msg").innerHTML =
"✅ Account Created Successfully";

}catch(error){

document.getElementById("msg").innerHTML =
"❌ " + error.message;

}

});

</script>

</body>
</html>
