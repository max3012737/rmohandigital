<!DOCTYPE html>
<html>
<head>
    <title>Student Signup</title>
</head>
<body>

    <h2>Student Signup</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <br><br>

    <input type="password" id="password" placeholder="Enter Password">
    <br><br>

    <button id="signupBtn">Sign Up</button>

    <p id="message"></p>

    <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQhTcbf7u4Aw2hgIgm3jS1ucm8_21Hj8U",
      authDomain: "r-mohan-digital.firebaseapp.com",
      projectId: "r-mohan-digital",
      storageBucket: "r-mohan-digital.firebasestorage.app",
      messagingSenderId: "437837739461",
      appId: "1:437837739461:web:fc28e8d077702f846907ac",
      measurementId: "G-MD0GC0ZZ29"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("signupBtn").addEventListener("click", async () => {

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);

        document.getElementById("message").innerHTML =
        "Signup Successful!";

        window.location.href = "login.html";

      } catch(error) {

        document.getElementById("message").innerHTML =
        error.message;

      }

    });

    </script>

</body>
</html>
